<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Addmission Form </title>
</head>
<body>
    <h2><i><mark><u>Student Addmission Form</u></mark></i></h2>

    <form action="#" method="post">

        <label for ="Name">Studet Name:</label>
        <input type="text" name ="Student Name" requried placeholder="Enter Student Name"><br><br>

        <label for ="Name">Father's Name:</label>
        <input type ="text" name="Father's Name" requried placeholder="Enter Father's Name"><br><br>

        <label for ="Name">Mother's Name:</label>
        <input type=" text" name="Mother's Name" requried placeholder="Enter Mother's Name"><br><br>

        <label for ="email">Email:</label>
        <input type ="email" name="Email" requried placeholder="Enter your Email"><br><br>

        <label for="tel">Mobile Number:</label>
        <input type="tel" name="Mobile Number" requried placeholder ="Enter your Mobile Number"><br><br >
        
        <label for="gender">Gender:</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female<br><br>

        <label for="Date">Date of Birth:</label>
        <input type="date" name="Date of Birth" requried placeholder="Enter Date of Birth"><br><br>

        <label for="Course">Course:</label>
        <select>
            <option>Compurter Engineering</option>
            <option>Information Technology</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>  
            <OPTION>Electrical Engineering</OPTION>

        </select>
       <br><br>
        
       <label for ="Address">Address:</label><br>
      <textarea name="Address" rows="5" cols="25" placeholder="Enter your Address"></textarea><br><br>
 
       <label for="Hobbies">Hobbies:</label>
         <input type="checkbox" name="Hobbies">Reading
        <input type="checkbox" name="Hobbies">Sports 
        <input type="checkbox" name="Hobbies">Music<br><br>

        <label for="Photo">Upload Photo:</label>
        <input type="file" name="Photo" required placeholder="Upload Photo"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
