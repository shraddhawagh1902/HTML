<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>

<body>

    <table border="1" cellspacing="0" cellpadding="30">
        <caption><b>Student Report</b></caption>

        <thread>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Marks</th>
            </tr>
        </thread>

        <tbody>
            <tr>
                <td>1</td>
                <td>Shraddha</td>
                <td>92</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Shri</td>
                <td>90</td>
            </tr>

        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Total Students</td>
                <td>2</td>
            </tr>
        </tfoot>

       </table>
</body>
</html>
